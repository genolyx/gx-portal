services:
  # ─── nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gx-portal-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - gx-portal

  # ─── Next.js frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: gx-portal-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://nginx/api
    networks:
      - gx-portal

  # ─── NestJS BFF ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: gx-portal-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DAEMON_URL=http://host.docker.internal:8010
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=15m
      - USERS_DB_PATH=/data/portal.db
      - CORS_ORIGINS=http://localhost:8090
    volumes:
      - gx-portal-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gx-portal

networks:
  gx-portal:
    driver: bridge

volumes:
  gx-portal-data:
